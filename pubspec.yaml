name: luxor_dr
description: "Luxor Doctor App"
publish_to: 'none'
version: 1.0.0+7

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # state management
  get: ^4.7.3

  # firebase
  cloud_firestore: ^6.0.0
  cloud_functions: ^6.0.0
  firebase_auth: ^6.0.1
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^17.2.1+2

  # routing & utilities
  go_router: ^16.2.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  loading_animation_widget: ^1.3.0
  carousel_slider: ^5.0.0
  url_launcher: ^6.3.1
  connectivity_plus: ^6.0.5
  package_info_plus: ^10.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/luxor_logo.png
    - assets/whatsapp.png
